<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 624" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8a94a6"/>
    </marker>
  </defs>

  <!-- ══ Row 1: data sources ══ -->
  <g>
    <rect x="20"  y="18" width="280" height="58" rx="9" fill="#3d5a80"/>
    <text x="160" y="42" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">AD2CP data</text>
    <text x="160" y="61" text-anchor="middle" fill="#cfe0f2" font-size="11.5">beam velocity · amplitude · correlation · attitude · BT</text>

    <rect x="340" y="18" width="280" height="58" rx="9" fill="#3d5a80"/>
    <text x="480" y="42" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">SeaExplorer payload (pld1)</text>
    <text x="480" y="61" text-anchor="middle" fill="#cfe0f2" font-size="11.5">Legato CTD — T · S · P</text>

    <rect x="660" y="18" width="280" height="58" rx="9" fill="#3d5a80"/>
    <text x="800" y="42" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">SeaExplorer nav (gli)</text>
    <text x="800" y="61" text-anchor="middle" fill="#cfe0f2" font-size="11.5">GPS / dead-reckoned position · heading, pitch, roll</text>
  </g>

  <!-- ══ Row 2: readers ══ -->
  <g>
    <rect x="20"  y="118" width="280" height="58" rx="9" fill="#2a9d8f"/>
    <text x="160" y="142" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="bold">read_ad2cp · load_ad2cp · load_pnor</text>
    <text x="160" y="161" text-anchor="middle" fill="#e2f6f3" font-size="11.5">native binary · MIDAS netCDF · $PNOR · pld1.sub</text>

    <rect x="340" y="118" width="280" height="58" rx="9" fill="#2a9d8f"/>
    <text x="480" y="142" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="bold">load_seaexplorer_pld</text>
    <text x="480" y="161" text-anchor="middle" fill="#e2f6f3" font-size="11.5">via SeaExplorerIO · gz logs → CTD table</text>

    <rect x="660" y="118" width="280" height="58" rx="9" fill="#2a9d8f"/>
    <text x="800" y="142" text-anchor="middle" fill="#fff" font-size="13.5" font-weight="bold">load_seaexplorer_nav</text>
    <text x="800" y="161" text-anchor="middle" fill="#e2f6f3" font-size="11.5">SeaExplorerIO · GLIMPSE multi-route merge</text>
  </g>

  <!-- ══ Row 3: per-ping trunk + navigation references ══ -->
  <g>
    <rect x="20" y="216" width="600" height="72" rx="9" fill="#7d5ba6"/>
    <text x="320" y="239" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">qc! · soundspeed_correction · process_pings</text>
    <text x="320" y="258" text-anchor="middle" fill="#e9dff5" font-size="11.5">beam screening · TEOS-10 rescale · exact 3-beam beam→XYZ→ENU on isobars (IGRF)</text>
    <text x="320" y="275" text-anchor="middle" fill="#e9dff5" font-size="11.5">calibrate_shear_bias! · bt_velocity (screened)  →  relative velocity + bottom track</text>

    <rect x="660" y="216" width="280" height="72" rx="9" fill="#e9c46a"/>
    <text x="800" y="245" text-anchor="middle" fill="#3a2d09" font-size="14" font-weight="bold">compute_dac · surface_drift</text>
    <text x="800" y="266" text-anchor="middle" fill="#5c4a13" font-size="11.5">fix-to-fix depth-averaged current · surface GPS drift</text>
  </g>

  <!-- ══ Row 4: velocity solutions ══ -->
  <g>
    <rect x="20" y="340" width="290" height="96" rx="9" fill="#c1533c"/>
    <text x="165" y="364" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">solve_inverse</text>
    <text x="165" y="384" text-anchor="middle" fill="#f8e0da" font-size="11.5">Visbeck least-squares (sparse QR)</text>
    <text x="165" y="401" text-anchor="middle" fill="#f8e0da" font-size="11.5">DAC + bottom track + smoothness</text>
    <text x="165" y="424" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">→ U, V  (recommended)</text>

    <rect x="335" y="340" width="290" height="96" rx="9" fill="#a4484f"/>
    <text x="480" y="364" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">solve_shear</text>
    <text x="480" y="384" text-anchor="middle" fill="#f6dee0" font-size="11.5">grid shear · integrate</text>
    <text x="480" y="401" text-anchor="middle" fill="#f6dee0" font-size="11.5">reference to DAC</text>
    <text x="480" y="424" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">→ U, V  (cross-check)</text>

    <rect x="650" y="340" width="290" height="96" rx="9" fill="#457b9d"/>
    <text x="795" y="364" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">solve_w</text>
    <text x="795" y="384" text-anchor="middle" fill="#dcebf4" font-size="11.5">w = U_rel + dP/dt</text>
    <text x="795" y="401" text-anchor="middle" fill="#dcebf4" font-size="11.5">flight-model-free</text>
    <text x="795" y="424" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">→ W</text>
  </g>

  <!-- cross-consistency bracket between the two horizontal-velocity methods -->
  <path d="M 165 450 L 165 460 L 480 460 L 480 450" fill="none" stroke="#8a94a6" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="322" y="476" text-anchor="middle" fill="#8a94a6" font-size="11.5" font-style="italic">two methods, fail differently — agreement r = 0.88–0.98 is the end-to-end health check</text>

  <!-- ══ Row 5: products ══ -->
  <g>
    <rect x="20" y="496" width="920" height="70" rx="9" fill="#22333b"/>
    <text x="480" y="524" text-anchor="middle" fill="#fff" font-size="14.5" font-weight="bold">grid_profiles → export_sections · plot_sections     ·     coverage · data_gaps · missing_segments</text>
    <text x="480" y="546" text-anchor="middle" fill="#bfd3dc" font-size="11.5">depth-matched U/V/W sections · provenance netCDF · Makie figures · mission coverage &amp; gap reports</text>
  </g>
  <text x="480" y="600" text-anchor="middle" fill="#8a94a6" font-size="10.5" font-style="italic">validated: gliderad2cp parity 2×10⁻¹⁶ · native binary = MIDAS netCDF (bit-identical) · synthetic-truth recovery · four missions (DAC closure 1–2 mm/s, dive/climb ≈ 2 cm/s) · real-time ≈ delayed to 5 mm/s</text>

  <!-- ══ connectors ══ -->
  <g stroke="#8a94a6" stroke-width="1.6" fill="none">
    <!-- sources → readers -->
    <line x1="160" y1="78" x2="160" y2="114" marker-end="url(#arr)"/>
    <line x1="480" y1="78" x2="480" y2="114" marker-end="url(#arr)"/>
    <line x1="800" y1="78" x2="800" y2="114" marker-end="url(#arr)"/>
    <!-- AD2CP reader → trunk -->
    <line x1="160" y1="176" x2="160" y2="212" marker-end="url(#arr)"/>
    <!-- payload (CTD) reader → trunk (sound speed) -->
    <line x1="480" y1="176" x2="480" y2="212" marker-end="url(#arr)"/>
    <!-- nav reader → references (DAC) -->
    <line x1="800" y1="176" x2="800" y2="212" marker-end="url(#arr)"/>
    <!-- nav reader → trunk (declination) -->
    <path d="M 800 176 C 720 194, 660 212, 610 214" marker-end="url(#arr)"/>
    <!-- trunk → solvers (relative velocity / pings) -->
    <line x1="150" y1="288" x2="150" y2="336" marker-end="url(#arr)"/>
    <line x1="455" y1="288" x2="455" y2="336" marker-end="url(#arr)"/>
    <!-- trunk (right) → solve_w -->
    <path d="M 610 282 Q 790 305 795 336" marker-end="url(#arr)"/>
    <!-- references (DAC) bus → inverse & shear -->
    <path d="M 800 288 L 800 320 L 185 320"/>
    <line x1="185" y1="320" x2="185" y2="336" marker-end="url(#arr)"/>
    <line x1="505" y1="320" x2="505" y2="336" marker-end="url(#arr)"/>
    <!-- solvers → products -->
    <line x1="165" y1="436" x2="165" y2="492" marker-end="url(#arr)"/>
    <line x1="480" y1="436" x2="480" y2="492" marker-end="url(#arr)"/>
    <line x1="795" y1="436" x2="795" y2="492" marker-end="url(#arr)"/>
  </g>
  <!-- connector labels -->
  <text x="495" y="199" text-anchor="middle" fill="#8a94a6" font-size="11">T, S, P</text>
  <text x="700" y="203" text-anchor="middle" fill="#8a94a6" font-size="11">declination</text>
  <text x="815" y="199" text-anchor="middle" fill="#8a94a6" font-size="11">GPS/DR</text>
  <text x="650" y="314" text-anchor="middle" fill="#8a94a6" font-size="11">DAC</text>
</svg>
